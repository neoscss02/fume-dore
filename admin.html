<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>FAFIN FUME · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;500;600&family=Kanit:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{--piano:#0a0908;--gold:#d4af37;--gold-bright:#f4d77e;--gold-grad:linear-gradient(135deg,#b8902e,#f4d77e 45%,#d4af37 60%,#9c7724);
    --line:rgba(212,175,55,.18);--warm:#f2ede0;--muted:#8a8578;--sans:'Sarabun',sans-serif;--serif:'Playfair Display',serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1000px 600px at 80% -10%,rgba(212,175,55,.06),transparent 60%),linear-gradient(180deg,#060605,#0a0908);
    color:var(--warm);font-family:var(--sans);min-height:100vh;padding:24px 16px}
  .wrap{max-width:1180px;margin:0 auto}
  .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:24px}
  .top h1{font-family:var(--serif);font-weight:700;font-size:1.5rem;letter-spacing:.5px}
  .top h1 span{color:var(--gold-bright)}
  .top .sub{font-size:.85rem;color:var(--muted)}
  .btn{font-family:'Kanit',sans-serif;font-size:.9rem;border:none;cursor:pointer;padding:10px 20px;border-radius:30px;
    color:#0a0a0a;background:var(--gold-grad);background-size:200% 200%;transition:.35s}
  .btn:hover{background-position:right center;transform:translateY(-2px)}
  .btn.ghost{background:transparent;color:var(--gold-bright);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--gold);background:rgba(212,175,55,.08)}
  .btn.sm{padding:6px 14px;font-size:.8rem}
  .btn.del{background:none;color:#e39; border:1px solid rgba(230,120,150,.35)}
  .btn.del:hover{background:rgba(230,120,150,.12)}
  .login{max-width:380px;margin:12vh auto 0;background:linear-gradient(180deg,#100f0c,#0a0908);border:1px solid var(--line);
    border-radius:20px;padding:38px 30px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .login .crest{font-family:var(--serif);font-size:1.7rem;color:var(--gold-bright);margin-bottom:6px}
  .login p{color:var(--muted);font-size:.9rem;margin-bottom:22px}
  .login input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;
    padding:13px 16px;color:var(--warm);font-family:var(--sans);font-size:1rem;outline:none;margin-bottom:14px;transition:.3s}
  .login input:focus{border-color:var(--gold)}
  .login .btn{width:100%;padding:14px}
  .login .err{color:#e5a0a0;font-size:.85rem;min-height:1.1em;margin-top:12px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
  .stat{background:linear-gradient(160deg,rgba(255,255,255,.03),transparent);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
  .stat .n{font-family:var(--serif);font-size:1.9rem;color:var(--gold-bright);line-height:1}
  .stat .l{font-size:.8rem;color:var(--muted);margin-top:6px}
  .card{background:linear-gradient(180deg,#0e0d0b,#0a0908);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .thead{display:grid;grid-template-columns:88px 1.4fr 1.2fr .7fr .8fr 1fr 46px;gap:10px;padding:14px 18px;
    border-bottom:1px solid var(--line);font-size:.78rem;color:var(--muted);letter-spacing:.04em;background:rgba(212,175,55,.04)}
  .row{display:grid;grid-template-columns:88px 1.4fr 1.2fr .7fr .8fr 1fr 46px;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);
    align-items:center;font-size:.9rem;transition:.25s}
  .row:hover{background:rgba(255,255,255,.015)}
  .row:last-child{border-bottom:none}
  .code{font-family:var(--serif);color:var(--gold-bright);font-size:.95rem}
  .dim{color:var(--muted);font-size:.8rem}
  .addr{color:#cbc4b5;font-size:.82rem;line-height:1.35;max-height:3.4em;overflow:hidden}
  .total{font-family:var(--serif);color:var(--warm);font-size:1.05rem}
  .pay{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:#cbc4b5}
  select.status{width:100%;background:#100f0c;border:1px solid var(--line);border-radius:10px;padding:8px 10px;color:var(--warm);
    font-family:var(--sans);font-size:.85rem;outline:none;cursor:pointer}
  select.status:focus{border-color:var(--gold)}
  .note{font-size:.76rem;color:var(--muted);margin-top:4px;font-style:italic}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#141109;border:1px solid var(--gold);
    color:var(--gold-bright);padding:12px 22px;border-radius:30px;font-size:.9rem;opacity:0;pointer-events:none;transition:.35s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:820px){
    .thead{display:none}
    .row{grid-template-columns:1fr 1fr;gap:6px 12px;padding:16px}
    .row>div:nth-child(3){grid-column:1/3}
    .row .addr{grid-column:1/3}
    .row .actcol{grid-column:1/3;display:flex;justify-content:flex-end}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="login" id="login">
    <div class="crest">FAFIN&nbsp;FUME</div>
    <p>ระบบจัดการออเดอร์ · สำหรับเจ้าของร้าน</p>
    <input id="pw" type="password" placeholder="รหัสผ่าน admin" autocomplete="current-password" />
    <button class="btn" id="loginBtn">เข้าสู่ระบบ</button>
    <div class="err" id="loginErr"></div>
  </div>

  <div id="dash" style="display:none">
    <div class="top">
      <h1>FAFIN&nbsp;<span>ออเดอร์</span></h1>
      <span class="sub" id="updatedAt"></span>
      <div style="margin-left:auto;display:flex;gap:10px">
        <button class="btn ghost sm" id="refreshBtn">รีเฟรช</button>
        <button class="btn ghost sm" id="logoutBtn">ออกจากระบบ</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="card">
      <div class="thead">
        <div>รหัส/เวลา</div><div>ผู้รับ</div><div>ที่อยู่</div><div>จำนวน</div><div>ยอด/ชำระ</div><div>สถานะ</div><div></div>
      </div>
      <div id="rows"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const WORKER = "https://fafin-proxy.neoscss02.workers.dev";
  const KEY = "fafin_admin_token";
  const S_LABEL = { new:"🆕 ใหม่", confirmed:"✅ ยืนยันแล้ว", shipped:"🚚 จัดส่งแล้ว", done:"🎉 เสร็จสิ้น", cancelled:"✖ ยกเลิก" };
  const PAY_LABEL = { cod:"ปลายทาง", transfer:"โอนเงิน", wholesale:"ราคาส่ง · ติดต่อกลับ" };
  let token = "";

  const $ = function(id){ return document.getElementById(id); };
  function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function money(n){ return '฿'+Number(n||0).toLocaleString('en-US'); }
  function fmtTime(s){ try{ var d=new Date(s); return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return s; } }
  function code(id){ return 'FF'+String(id).padStart(5,'0'); }

  async function api(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ "X-Admin-Token": token }, opts.headers || {});
    var res = await fetch(WORKER + path, opts);
    var data = await res.json().catch(function(){ return {}; });
    if(!res.ok || !data.ok) throw new Error(data.error || ('http_'+res.status));
    return data;
  }

  async function doLogin(){
    var pw = $('pw').value.trim();
    var err = $('loginErr'); err.textContent="";
    if(!pw){ err.textContent="กรอกรหัสผ่านค่ะ"; return; }
    token = pw;
    $('loginBtn').disabled = true; $('loginBtn').textContent="กำลังเข้า…";
    try{
      var d = await api("/admin/orders");
      try{ localStorage.setItem(KEY, token); }catch(e){}
      showDash(d.orders);
    }catch(e){
      err.textContent = (e.message==='unauthorized') ? "รหัสผ่านไม่ถูกต้อง" : ("เข้าไม่ได้: "+e.message);
      token="";
    }finally{ $('loginBtn').disabled=false; $('loginBtn').textContent="เข้าสู่ระบบ"; }
  }

  function showDash(orders){ $('login').style.display='none'; $('dash').style.display=''; render(orders); }

  async function reload(){
    try{ var d = await api("/admin/orders"); render(d.orders); toast("อัปเดตแล้ว"); }
    catch(e){ toast("โหลดไม่สำเร็จ: "+e.message); if(e.message==='unauthorized') logout(); }
  }

  function render(orders){
    orders = orders || [];
    $('updatedAt').textContent = "อัปเดต "+ new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    var open = orders.filter(function(o){ return o.status!=='done' && o.status!=='cancelled'; }).length;
    var rev = orders.filter(function(o){ return o.status!=='cancelled'; }).reduce(function(a,o){ return a+(o.total||0); },0);
    var qty = orders.filter(function(o){ return o.status!=='cancelled'; }).reduce(function(a,o){ return a+(o.qty||0); },0);
    $('stats').innerHTML = stat(orders.length,"ออเดอร์ทั้งหมด") + stat(open,"ที่ต้องจัดการ") + stat(qty,"จำนวนขวด") + stat(money(rev),"ยอดขายรวม");
    if(!orders.length){ $('rows').innerHTML = '<div class="empty">ยังไม่มีออเดอร์ค่ะ 🌹</div>'; return; }
    $('rows').innerHTML = orders.map(rowHtml).join('');
    Array.prototype.forEach.call(document.querySelectorAll('select.status'), function(sel){
      sel.addEventListener('change', function(){ setStatus(sel.dataset.id, sel.value); });
    });
    Array.prototype.forEach.call(document.querySelectorAll('button.del'), function(b){
      b.addEventListener('click', function(){ delOrder(b.dataset.id, b.dataset.code); });
    });
  }
  function stat(n,l){ return '<div class="stat"><div class="n">'+esc(n)+'</div><div class="l">'+esc(l)+'</div></div>'; }

  function rowHtml(o){
    var opts = Object.keys(S_LABEL).map(function(k){ return '<option value="'+k+'"'+(o.status===k?' selected':'')+'>'+S_LABEL[k]+'</option>'; }).join('');
    return '<div class="row">'
      + '<div><div class="code">'+code(o.id)+'</div><div class="dim">'+fmtTime(o.created_at)+'</div></div>'
      + '<div><div>'+esc(o.customer_name)+'</div><div class="dim">'+esc(o.phone)+'</div>'+(o.note?'<div class="note">“'+esc(o.note)+'”</div>':'')+'</div>'
      + '<div class="addr">'+esc(o.address)+'</div>'
      + '<div>'+esc(o.qty)+' ขวด</div>'
      + '<div><div class="total">'+(o.payment_method==='wholesale'?'<span style="font-size:.82rem;color:#c8a2ff">รอตกลงราคา</span>':money(o.total))+'</div><span class="pay">'+(PAY_LABEL[o.payment_method]||esc(o.payment_method))+'</span></div>'
      + '<div><select class="status" data-id="'+o.id+'">'+opts+'</select></div>'
      + '<div class="actcol"><button class="btn del sm" data-id="'+o.id+'" data-code="'+code(o.id)+'" title="ลบ">✕</button></div>'
      + '</div>';
  }

  async function setStatus(id, status){
    try{ await api("/admin/order",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id:Number(id), status:status}) });
      toast("อัปเดตสถานะ "+code(Number(id))+" แล้ว"); reload();
    }catch(e){ toast("อัปเดตไม่สำเร็จ: "+e.message); }
  }
  async function delOrder(id, cd){
    if(!confirm("ลบออเดอร์ "+cd+" ?")) return;
    try{ await api("/admin/order",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id:Number(id), action:"delete"}) });
      toast("ลบ "+cd+" แล้ว"); reload();
    }catch(e){ toast("ลบไม่สำเร็จ: "+e.message); }
  }
  function logout(){ token=""; try{ localStorage.removeItem(KEY); }catch(e){} $('dash').style.display='none'; $('login').style.display=''; $('pw').value=''; }

  $('loginBtn').addEventListener('click', doLogin);
  $('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  $('refreshBtn').addEventListener('click', reload);
  $('logoutBtn').addEventListener('click', logout);
  (async function(){
    var saved=""; try{ saved=localStorage.getItem(KEY)||""; }catch(e){}
    if(saved){ token=saved; try{ var d=await api("/admin/orders"); showDash(d.orders); }catch(e){ logout(); } }
  })();
</script>
</body>
</html>
